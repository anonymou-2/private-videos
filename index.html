<!DOCTYPE html>
<html>
<head>
<title>My Media Library</title>
<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
h1 { text-align:center; color:#1E90FF; }
h2 { border-bottom:1px solid #555; margin-top:30px; }
a { color:#1E90FF; text-decoration:none; display:block; margin:5px 0; }
a:hover { text-decoration:underline; }
</style>
</head>
<body>

<h1>My Media Library</h1>

<div id="media"></div>

<script>
// --- MAIN MEGA FOLDER LINK ---
const MEGA_FOLDER_LINK = "https://mega.nz/folder/vsxBGIyS#M5s0715t2LNRFnZCo7jBBw";

// --- LIST YOUR SUBFOLDERS AND FILES ---
const categories = {
    "Movies": ["movie1.mp4", "movie2.mp4"],
    "Tutorials": ["lesson1.mp4", "lesson2.mp4"],
    "Images": ["photo1.jpg", "photo2.jpg"]
};

// --- GENERATE LINKS ---
const container = document.getElementById("media");
for (let cat in categories) {
    const h2 = document.createElement("h2");
    h2.innerText = cat;
    container.appendChild(h2);
    
    categories[cat].forEach(file => {
        const a = document.createElement("a");
        a.href = MEGA_FOLDER_LINK + "/" + file;
        a.target = "_blank";
        a.innerText = file;
        container.appendChild(a);
    });
}
</script>

</body>
</html>
