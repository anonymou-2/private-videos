<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Collections</title>
<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:white;}
header{padding:15px;text-align:center;font-size:24px;background:#141414;}
#collections{padding:20px;}
.folder{margin-bottom:30px;}
.folder h2{border-bottom:2px solid #ff0033;padding-bottom:5px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:10px;}
.card{background:#1c1c1c;border-radius:10px;overflow:hidden;transition:0.3s;}
.card:hover{transform:scale(1.03);}
.card video, .card img{width:100%;display:block;}
.title{text-align:center;padding:5px;font-size:14px;}
.login{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:flex;justify-content:center;align-items:center;flex-direction:column;}
.login input{padding:10px;font-size:16px;margin:10px;border-radius:5px;border:none;}
.login button{padding:10px 20px;background:#e50914;border:none;color:white;font-size:16px;border-radius:5px;cursor:pointer;}
</style>
</head>
<body>

<div class="login" id="login">
<h2>Enter Password</h2>
<input type="password" id="pass">
<button id="enterBtn">Enter</button>
</div>

<header>My Private Collections</header>
<div id="collections"></div>

<script>
const password="OnlyForMe@321"; // Your password
const appScriptURL="https://script.google.com/macros/s/AKfycbwzQwupyqbDeCvDZg25zdHzacwUiZxduVv1wZp2WA9J8sSFid9wfhAgxZS-K6aVPih4QA/exec";

document.getElementById("enterBtn").addEventListener("click",()=>{
  const input=document.getElementById("pass").value.trim();
  if(input===password){
    document.getElementById("login").style.display="none";
    loadCollections();
  } else{
    alert("Wrong Password");
  }
});

function loadCollections(){
  fetch(appScriptURL)
  .then(res=>res.json())
  .then(data=>{
    if(data.error){
      alert("Apps Script Error: "+data.error);
      return;
    }
    const container=document.getElementById("collections");
    container.innerHTML="";
    data.forEach(folder=>{
      const folderDiv=document.createElement("div");
      folderDiv.className="folder";
      folderDiv.innerHTML=`<h2>${folder.folder}</h2>`;
      const grid=document.createElement("div");
      grid.className="grid";
      folder.files.forEach(file=>{
        const card=document.createElement("div");
        card.className="card";
        if(file.type==="video"){
          card.innerHTML=`<video controls src="${file.link}"></video><div class="title">${file.name}</div>`;
        } else{
          card.innerHTML=`<img src="${file.link}"><div class="title">${file.name}</div>`;
        }
        grid.appendChild(card);
      });
      folderDiv.appendChild(grid);
      container.appendChild(folderDiv);
    });
  })
  .catch(err=>{
    console.error("Failed to load collections:", err);
    alert("Failed to load collections. Check Apps Script URL and Drive folder permissions.");
  });
}
</script>

</body>
</html>
